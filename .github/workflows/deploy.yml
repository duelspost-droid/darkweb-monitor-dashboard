name: Scan and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * *" # 매일 00:30 KST (15:30 UTC) — Supabase 자정 스캔(15:00 UTC) 직후 반영

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 스캔은 Supabase Edge Function(pg_cron, 15:00 UTC)이 수행. 여기선 결과를 읽어와 빌드.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync from Supabase
        timeout-minutes: 5
        continue-on-error: true # 미설정/일시 오류 시 커밋된 스냅샷으로 빌드
        run: npm run supabase:pull

      - name: Commit dashboard snapshot if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update dashboard snapshot from Supabase"
          file_pattern: >-
            lib/data/generated/breachMonitor.ts

      - name: Build static site
        env:
          NEXT_OUTPUT: export
          PAGES_BASE_PATH: /darkweb-monitor-dashboard
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
