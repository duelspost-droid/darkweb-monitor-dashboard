name: Scan and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *" # 매일 01:00 KST (16:00 UTC)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HIBP_API_KEY: ${{ secrets.HIBP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run breach scan
        timeout-minutes: 10
        continue-on-error: true
        run: npm run security:scan

      - name: Commit scan results if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update daily breach scan"
          file_pattern: >-
            lib/data/generated/breachMonitor.ts
            data/security/latest_breach_scan.json
            data/security/history/*.json

      - name: Build static site
        env:
          NEXT_OUTPUT: export
          PAGES_BASE_PATH: /darkweb-monitor-dashboard
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
